# ==================================================
# RAG Q&A System - CD Pipeline (ECR + App Runner)
# ==================================================

name: CD - Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rag-qa-system
  ECS_CLUSTER: rag-qa-chatbot23
  ECS_SERVICE: rag-qa-chatbot
  #APP_RUNNER_SERVICE: rag-qa-service

jobs:
  # ============================================
  # Build and Push to ECR
  # ============================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Output the image URI
          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

          echo "✅ Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ============================================
  # Deploy to ECS
  # ============================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fill in image URI
        id: task-def
        run: |
          sed "s|IMAGE_URI_PLACEHOLDER|${{ needs.build-and-push.outputs.image_uri }}|g" ecs-task-def.json > task-def.json

      
    # Inject secrets dynamically
      - name: Inject environment variables
        run: |
          jq '.containerDefinitions[0].environment = [
          {"name":"OPENAI_API_KEY","value":"${{ secrets.OPENAI_API_KEY }}"},
          {"name":"QDRANT_URL","value":"${{ secrets.QDRANT_URL }}"},
          {"name":"QDRANT_API_KEY","value":"${{ secrets.QDRANT_API_KEY }}"},
          {"name":"LOG_LEVEL","value":"INFO"},
          {"name":"LANGSMITH_TRACING","value":"true"},
          {"name":"LANGSMITH_API_KEY","value":"${{ secrets.LANGSMITH_API_KEY }}"},
          {"name":"LANGSMITH_PROJECT","value":"rag-qa-chatbot23"},
          {"name":"LANGSMITH_ENDPOINT","value":"https://eu.api.smith.langchain.com"}
          ]' task-def.json > final-task-def.json
      
      # Register new task definition
      - name: Register task definition
        id: register-task
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://final-task-def.json
      
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

      - name: Deployment success
        run: echo "🚀 ECS deployment completed!"


